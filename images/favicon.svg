<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <clipPath id="shield-clip">
      <path d="M50,5 C77,5 93,21 91,47 C88,69 70,83 50,96 C30,83 12,69 9,47 C7,21 23,5 50,5 Z"/>
    </clipPath>
  </defs>

  <!-- Shield cream fill -->
  <path d="M50,5 C77,5 93,21 91,47 C88,69 70,83 50,96 C30,83 12,69 9,47 C7,21 23,5 50,5 Z"
        fill="#f0e8cc"/>

  <!-- Sky blue top band -->
  <rect x="0" y="0" width="100" height="28" clip-path="url(#shield-clip)" fill="#5ab0e8"/>
  <!-- Green treeline strip -->
  <rect x="0" y="22" width="100" height="9" clip-path="url(#shield-clip)" fill="#4a9e3a"/>

  <!-- Shield navy border (drawn on top of color bands) -->
  <path d="M50,5 C77,5 93,21 91,47 C88,69 70,83 50,96 C30,83 12,69 9,47 C7,21 23,5 50,5 Z"
        fill="none" stroke="#12275a" stroke-width="5"/>

  <!-- Red T (left): horizontal bar x=12–47, vertical stem centered at x=29.5 -->
  <rect x="12" y="34" width="35" height="9" rx="1.5" fill="#cc1f00"/>
  <rect x="24" y="34" width="11" height="33" rx="1.5" fill="#cc1f00"/>

  <!-- Blue T (right): horizontal bar x=53–88, vertical stem centered at x=70.5 -->
  <rect x="53" y="34" width="35" height="9" rx="1.5" fill="#1a72d4"/>
  <rect x="65" y="34" width="11" height="33" rx="1.5" fill="#1a72d4"/>
</svg>
